<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiskars | Som Construído para Durar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIÁVEIS E ESTILOS GLOBAIS --- */
        :root {
            --fiskars-orange: #FF6600;
            --fiskars-orange-hover: #e65c00;
            --bg-dark: #000000;
            --bg-section: #121212;
            --bg-card: #1e1e1e;
            --text-main: #FFFFFF;
            --text-muted: #AAAAAA;
            --border-color: #333333;
        }

        html { scroll-behavior: smooth; }

        * {
            box-sizing: border-box; /* Fundamental para responsividade */
        }

        body {
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            color: var(--text-main); background-color: var(--bg-dark);
            line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden;
            width: 100%;
        }

        h1, h2, h3, .logo, .product-price, .cart-total, .checkout-button, .buy-button { 
            font-family: 'Oswald', sans-serif; 
            text-transform: uppercase; 
            color: var(--fiskars-orange); font-weight: 700; margin-top: 0; 
        }

        /* Textura Industrial Subtil */
        .pattern-bg {
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- CABEÇALHO --- */
        .site-header { width: 100%; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); background-color: var(--bg-dark); }
        .header-main { position: relative; height: 100px; width: 100%; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .logo-container { position: absolute; left: 48px; top: 22px; transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .logo { color: var(--fiskars-orange); font-weight: 700; font-size: clamp(1.2rem, 3vw, 1.8rem); text-decoration: none; letter-spacing: 1px; margin: 0; }
        .header-actions { position: absolute; right: 48px; top: 20px; transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .nav-top { position: absolute; left: 48px; top: 60px; display: flex; gap: 24px; opacity: 1; visibility: visible; transform: translateY(0); transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s; }
        .nav-center { position: absolute; left: 50%; top: 22px; display: flex; gap: 24px; opacity: 0; visibility: hidden; transform: translateX(-50%) translateY(10px); transition: opacity 0.3s ease 0.1s, transform 0.3s ease 0.1s, visibility 0.3s; }
        .primary-nav a { color: var(--text-main); text-decoration: none; font-size: 14px; font-weight: 600; padding-bottom: 6px; border-bottom: 3px solid transparent; transition: color 0.2s, border-color 0.2s; text-transform: uppercase; letter-spacing: 0.5px;}
        .primary-nav a:hover, .primary-nav a.active { border-bottom: 3px solid var(--fiskars-orange); color: var(--fiskars-orange); }

        .site-header.scrolled .header-main { height: 64px; }
        .site-header.scrolled .logo-container { top: 18px; }
        .site-header.scrolled .header-actions { top: 14px; }
        .site-header.scrolled .nav-top { opacity: 0; visibility: hidden; transform: translateY(-10px); }
        .site-header.scrolled .nav-center { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        .header-cart-btn { background: none; border: none; color: var(--text-main); cursor: pointer; position: relative; display: flex; align-items: center; padding: 8px; transition: color 0.2s; }
        .header-cart-btn:hover { color: var(--fiskars-orange); }
        .cart-badge { position: absolute; top: 0; right: 0; background-color: var(--fiskars-orange); color: #000; font-size: 11px; font-weight: 900; border-radius: 50%; width: 18px; height: 18px; display: none; justify-content: center; align-items: center; transform: translate(25%, -15%); font-family: 'Inter', sans-serif;}
        .cart-badge.show { display: flex; }

        .breadcrumb-bar { background-color: #FFFFFF; padding: 10px 48px; font-size: 13px; color: #555555; display: flex; align-items: center; gap: 8px; font-weight: 600; flex-wrap: wrap;}
        .breadcrumb-bar a { color: #333333; text-decoration: none; }
        .breadcrumb-bar a:hover { text-decoration: underline; }
        .breadcrumb-bar .separator { color: #999999; font-size: 12px; }

        /* --- ANIMAÇÕES --- */
        .animate-up { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        .animate-up.visible { opacity: 1; transform: translateY(0); }

        /* --- SECÇÕES DE CONTEÚDO --- */
        .hero { position: relative; height: 90vh; min-height: 500px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5%; z-index: 1; text-align: center; }
        .hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: url('img-1.png'); background-color: #1a1a1a; background-size: cover; background-position: center; mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, black 100%); -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, black 100%); }
        .hero h1 { font-size: clamp(3rem, 8vw, 5rem); margin-bottom: 1rem; line-height: 1.1;}
        .hero p { font-size: clamp(1rem, 3vw, 1.2rem); color: #DDD; max-width: 600px; margin: 0 auto; }
        .hero-image { width: 100%; max-width: 600px; margin-top: 3rem; height: auto; object-fit: contain;}

        .store-section { padding: clamp(40px, 8vw, 80px) clamp(20px, 5vw, 48px); max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 60px; border-bottom: 1px solid var(--border-color); }
        .product-gallery { display: flex; flex-direction: column; gap: 20px; width: 100%;}
        .main-image-wrapper { position: relative; width: 100%; height: clamp(300px, 50vw, 500px); display: flex; justify-content: center; align-items: center; }
        .main-image-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.3s ease; }
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background-color: rgba(255, 102, 0, 0.1); color: var(--fiskars-orange); border: 1px solid var(--fiskars-orange); font-size: 24px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center; transition: all 0.2s ease; }
        .nav-arrow:hover { background-color: var(--fiskars-orange); color: #000; }
        .nav-arrow.left { left: 0px; }
        .nav-arrow.right { right: 0px; }
        .thumbnail-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0; width: 100%;}
        .thumb { width: 100%; aspect-ratio: 1/1; background-color: var(--bg-section); border: 2px solid var(--border-color); border-radius: 6px; cursor: pointer; object-fit: cover; transition: border-color 0.2s; }
        .thumb:hover, .thumb.active-thumb { border-color: var(--fiskars-orange); }

        .product-details { display: flex; flex-direction: column; justify-content: center; width: 100%;}
        .product-title { font-size: clamp(2rem, 5vw, 2.5rem); color: var(--text-main); margin-bottom: 4px; line-height: 1.1; }
        .product-badge { display: inline-block; background-color: var(--fiskars-orange); color: #000; font-size: 0.8rem; font-weight: bold; padding: 4px 10px; border-radius: 4px; margin-bottom: 16px; text-transform: uppercase; align-self: flex-start; font-family: 'Oswald', sans-serif;}
        
        .product-rating { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 0.9rem; color: var(--text-muted); flex-wrap: wrap;}
        .stars-icon { color: var(--fiskars-orange); letter-spacing: 2px; }
        
        .stock-pulse { display: flex; align-items: center; gap: 10px; color: #ff4444; font-weight: 600; font-size: 0.9rem; margin-bottom: 10px; }
        .pulse-dot { width: 10px; height: 10px; background-color: #ff4444; border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0;}
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); } }

        .trust-badges { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; margin-top: 16px; font-size: 0.85rem; color: #CCC; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 6px; border: 1px solid #333;}
        .trust-badge { display: flex; align-items: center; gap: 8px; }
        .trust-badge svg { color: var(--fiskars-orange); flex-shrink: 0;}

        .product-price { font-size: clamp(2.5rem, 6vw, 3rem); font-weight: 400; color: var(--text-main); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .product-price span { font-size: clamp(1.2rem, 3vw, 1.5rem); position: relative; top: -1em;}
        .product-description-list { list-style: none; padding: 0; margin-bottom: 32px; font-size: clamp(0.9rem, 2vw, 0.95rem); }
        .product-description-list li { margin-bottom: 12px; padding-left: 24px; position: relative; color: var(--text-muted); }
        .product-description-list li::before { content: '✓'; color: var(--fiskars-orange); position: absolute; left: 0; font-weight: bold; }
        .product-description-list strong { color: #FFF; }
        
        .buy-button { background-color: var(--fiskars-orange); color: #000; border: none; padding: 20px 32px; font-size: clamp(1.1rem, 3vw, 1.3rem); letter-spacing: 1px; border-radius: 4px; cursor: pointer; transition: background-color 0.2s, transform 0.1s; display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3); }
        .buy-button:hover { background-color: var(--fiskars-orange-hover); box-shadow: 0 6px 20px rgba(255, 102, 0, 0.4); }
        .buy-button:active { transform: scale(0.98); }

        .gallery-section, .info-section { padding: clamp(40px, 8vw, 80px) clamp(20px, 5vw, 48px); max-width: 1200px; margin: 0 auto; border-bottom: 1px solid var(--border-color); width: 100%;}
        
        .info-section h2, .gallery-section h2 { font-size: clamp(1.8rem, 5vw, 2.5rem); margin-bottom: 10px;}

        .lifestyle-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-top: 40px; }
        .lifestyle-grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); transition: transform 0.3s ease; }
        .lifestyle-grid img:hover { transform: scale(1.02); }
        
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 50px 30px; margin-top: 40px; }
        .feature-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .feature-card h3 { font-size: clamp(1.2rem, 3vw, 1.5rem); margin-bottom: 10px; }
        .feature-card p { color: var(--text-muted); font-size: clamp(0.9rem, 2vw, 0.95rem); margin: 0; line-height: 1.6; }
        
        .reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 40px; }
        .review-card { background-color: var(--bg-card); padding: 24px; border-radius: 8px; border: 1px solid var(--border-color); }
        .review-card .stars-icon { font-size: 1.2rem; margin-bottom: 10px; display: inline-block; }
        .review-card p { font-style: italic; color: var(--text-muted); margin-bottom: 15px; font-size: 0.95rem; }
        .review-author { font-weight: 600; color: #FFF; font-size: 0.9rem; }
        .review-author span { color: #777; font-weight: 400; font-size: 0.8rem; }

        .contact-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 40px; }
        .contact-item { background-color: var(--bg-card); padding: 30px 20px; border-radius: 8px; text-align: center; border: 1px solid var(--border-color); flex: 1 1 250px; min-width: 250px; max-width: 350px;}
        .contact-item h4 { font-size: 1.2rem; margin: 0 0 10px 0; }
        .contact-item a { color: var(--text-main); text-decoration: none; font-size: clamp(1rem, 2.5vw, 1.1rem); font-weight: 600; transition: color 0.2s; word-break: break-all;}
        .contact-item a:hover { color: var(--fiskars-orange); }

        footer { padding: 40px 20px; text-align: center; color: #555; font-size: 0.85rem; background-color: var(--bg-section); }

        /* --- CARRINHO LATERAL --- */
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); z-index: 998; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; backdrop-filter: blur(5px); }
        .cart-overlay.active { opacity: 1; visibility: visible; }
        .cart-drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px; height: 100vh; background-color: var(--bg-section); z-index: 999; box-shadow: -10px 0 30px rgba(0,0,0,0.9); transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; border-left: 1px solid var(--border-color); }
        .cart-drawer.active { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .cart-header h2 { margin: 0; font-size: clamp(1.4rem, 4vw, 1.8rem); color: #FFF; }
        .close-cart { background: none; border: none; color: var(--text-muted); font-size: 2.5rem; cursor: pointer; transition: color 0.2s; line-height: 0.5; padding: 0;}
        .close-cart:hover { color: var(--fiskars-orange); }
        .cart-items { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .cart-item { display: flex; gap: 12px; align-items: center; background-color: var(--bg-card); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); position: relative; }
        .cart-item img { width: 60px; height: 60px; object-fit: contain; background-color: var(--bg-dark); border-radius: 6px; flex-shrink: 0;}
        .cart-item-details { display: flex; flex-direction: column; justify-content: center; flex: 1; min-width: 0;} /* min-width 0 previne overflow de texto */
        .cart-item-title { font-size: 0.9rem; font-weight: 600; margin: 0 0 6px 0; color: var(--text-main); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .cart-item-price-wrapper { display: flex; align-items: center; gap: 10px; }
        .cart-item-price { color: var(--fiskars-orange); font-weight: 700; margin: 0; font-size: 1.1rem; font-family: 'Oswald', sans-serif;}
        .cart-item-quantity { color: var(--text-muted); font-size: 0.8rem; background-color: #333; padding: 2px 8px; border-radius: 12px; font-weight: 600;}
        .remove-item-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 5px; transition: color 0.2s; flex-shrink: 0;}
        .remove-item-btn:hover { color: #ff4444; }
        
        /* Upsell no Carrinho */
        .cart-upsell { background-color: #1a1a1a; padding: 15px 20px; border-top: 1px solid var(--border-color); }
        .cart-upsell p { margin: 0 0 10px 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase;}
        .upsell-box { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px; border-radius: 6px; border: 1px dashed #444; gap: 10px;}
        .upsell-info { display: flex; flex-direction: column; }
        .upsell-name { font-size: 0.85rem; font-weight: 600; }
        .upsell-price { font-size: 0.85rem; color: var(--fiskars-orange); font-family: 'Oswald', sans-serif;}
        .upsell-btn { background: none; border: 1px solid var(--fiskars-orange); color: var(--fiskars-orange); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: all 0.2s; text-transform: uppercase; flex-shrink: 0;}
        .upsell-btn:hover { background: var(--fiskars-orange); color: #000; }

        .cart-footer { padding: 20px; background-color: var(--bg-dark); }
        .cart-total { display: flex; justify-content: space-between; font-size: clamp(1.2rem, 4vw, 1.5rem); margin-bottom: 20px; color: #FFF; font-weight: bold;}
        .checkout-button { width: 100%; background-color: var(--fiskars-orange); color: #000; border: none; padding: 15px; font-size: clamp(1rem, 3vw, 1.2rem); letter-spacing: 1px; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; font-weight: bold;}
        .checkout-button:hover { background-color: var(--fiskars-orange-hover); }

        /* --- LIGHTBOX --- */
        .zoomable { cursor: zoom-in; transition: opacity 0.2s; }
        .zoomable:hover { opacity: 0.8; }
        .lightbox-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .lightbox-modal.active { opacity: 1; visibility: visible; }
        .lightbox-img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); transform: scale(0.95); transition: transform 0.3s ease; }
        .lightbox-modal.active .lightbox-img { transform: scale(1); }
        .lightbox-close-btn { position: absolute; top: 20px; right: 20px; color: #FFFFFF; font-size: 40px; font-weight: 300; cursor: pointer; transition: color 0.2s; z-index: 2001; line-height: 1; background: rgba(0,0,0,0.5); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;}
        .lightbox-close-btn:hover { color: var(--fiskars-orange); }

        /* --- RESPONSIVIDADE (MOBILE & TABLET) --- */
        @media (max-width: 1000px) {
            .header-main { height: auto !important; padding: 15px 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
            .logo-container { position: relative; left: auto; top: auto; flex: 1; }
            .header-actions { position: relative; right: auto; top: auto; }
            
            /* Menu de Navegação Horizontal Scrollable no Mobile */
            .nav-top { 
                position: relative; left: auto; top: auto; width: 100%; 
                margin-top: 15px; order: 3; transform: none !important; opacity: 1 !important; visibility: visible !important; 
                display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px;
                -webkit-overflow-scrolling: touch; /* Scroll suave no iOS */
                scrollbar-width: none; /* Esconde scrollbar Firefox */
            }
            .nav-top::-webkit-scrollbar { display: none; } /* Esconde scrollbar Chrome/Safari */
            .primary-nav a { white-space: nowrap; font-size: 13px;}
            
            .nav-center { display: none !important; } 
            
            .breadcrumb-bar { padding: 10px 20px; justify-content: center;}
            
            .trust-badges { flex-direction: column; align-items: flex-start; gap: 12px; }
            
            /* Ajuste para imagens dos Gifs */
            #product-gifs > div { display: flex; flex-direction: column; gap: 20px; }
            
            /* Ajuste de Especificações Técnicas */
            #specs > div { grid-template-columns: 1fr; }
        }
    </style>
</head>
